name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: kiwi
            asset_name: kiwi-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: kiwi
            asset_name: kiwi-linux-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: kiwi
            asset_name: kiwi-macos-amd64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: kiwi
            asset_name: kiwi-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kiwi.exe
            asset_name: kiwi-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/local/.ghcup /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install protoc (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $protocVersion = "27.1"
          $protocZip = "protoc-$protocVersion-win64.zip"
          $protocUrl = "https://github.com/protocolbuffers/protobuf/releases/download/v$protocVersion/$protocZip"
          $protocPath = "$env:RUNNER_TEMP\protoc"
          Invoke-WebRequest -Uri $protocUrl -OutFile "$env:RUNNER_TEMP\$protocZip"
          Expand-Archive -Path "$env:RUNNER_TEMP\$protocZip" -DestinationPath $protocPath
          echo "$protocPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Create tarball (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          VERSION="${{ github.ref_name }}"
          NAME="${{ matrix.asset_name }}-${VERSION}"
          STAGE="dist/${NAME}"
          
          mkdir -p "${STAGE}"
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} "${STAGE}/"
          cp README.md LICENSE "${STAGE}/" || true
          
          cd dist
          tar -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" | awk '{print $1}' > "${NAME}.tar.gz.sha256"

      - name: Create zip (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $VERSION = "${{ github.ref_name }}"
          $NAME = "${{ matrix.asset_name }}-${VERSION}"
          $STAGE = "dist\${NAME}"
          
          New-Item -ItemType Directory -Force -Path $STAGE
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" -Destination "${STAGE}\"
          Copy-Item "README.md", "LICENSE" -Destination "${STAGE}\" -ErrorAction SilentlyContinue
          
          Compress-Archive -Path $STAGE -DestinationPath "dist\${NAME}.zip"
          (Get-FileHash "dist\${NAME}.zip" -Algorithm SHA256).Hash.ToLower() | Out-File -FilePath "dist\${NAME}.zip.sha256" -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "Kiwi ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
