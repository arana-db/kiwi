name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run every Monday at 6:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  # Check for known vulnerabilities in dependencies
  # Non-blocking: reports findings but does not fail the PR check.
  # Fix the reported vulnerabilities separately by updating dependencies.
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  # Check dependency licenses and advisories.
  # Non-blocking: requires a deny.toml config to be meaningful.
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check advisories and licenses
        run: cargo deny check advisories licenses
