name: Bug report
description: Create a report to help us improve
labels: ["☢️ Bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 Thank you for your feedback!
        
        Please fill out the following information to help us understand and resolve the issue.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: "✅ Verification Checklist"
      description: "Please verify that you've completed the following:"
      options:
        - label: "🔍 I have searched the existing issues and confirmed this is not a duplicate"
          required: true
        - label: "📖 I have read the documentation and confirmed this is a bug"
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🔧 Environment Information

  - type: input
    id: version
    attributes:
      label: "📦 Kiwi-rs Version"
      description: "What version of kiwi-rs are you running?"
      placeholder: "e.g. v1.0.0"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: "🦀 Rust Version"
      description: "Rust toolchain version (run `rustc --version`)"
      placeholder: "e.g., rustc 1.75.0"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: "💾 Operating System"
      description: "What platform are you using?"
      multiple: true
      options:
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Debian
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows 10
        - Windows 11
        - Docker
        - Other Linux
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🐛 Issue Details

  - type: textarea
    id: what-happened
    attributes:
      label: "📝 Bug Description"
      description: "A clear and concise description of what the bug is"
      placeholder: |
        Please describe the bug in detail, including:
        • Specific problem symptoms
        • Error messages (if any)
        • Impact scope
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "🔄 Steps to Reproduce"
      description: "Please provide detailed steps to reproduce this issue"
      placeholder: |
        Please list the steps to reproduce:
        1. First step...
        2. Second step...
        3. Third step...
        4. See error
        
        💡 If possible, please provide a minimal reproduction code or configuration
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen?"
      placeholder: "Describe in detail what the correct behavior should be..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "❌ Actual Behavior"
      description: "What actually happened?"
      placeholder: |
        Describe what actually happened, including:
        • Error messages
        • Stack traces
        • Log output
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "📋 Relevant Logs"
      description: "Please paste relevant log output (if any)"
      placeholder: |
        Paste logs here (use triple backticks for formatting)
        ```
        log output here
        ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: "⚙️ Configuration"
      description: "Relevant configuration (with sensitive data removed)"
      placeholder: |
        Paste relevant config here (remove API keys and tokens!)
        ```toml
        [section]
        key = "value"
        ```
      render: toml
    validations:
      required: false

  - type: textarea
    id: possible-solution
    attributes:
      label: "💡 Possible Solution"
      description: "If you have ideas on how to fix this issue, please share them here"
      placeholder: "Share your thoughts, suggestions, or attempted solutions..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "📎 Additional Context"
      description: "Add any other context about the problem here"
      placeholder: "Screenshots, related issues, etc."
    validations:
      required: false
