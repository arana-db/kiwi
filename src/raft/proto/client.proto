syntax = "proto3";

package kiwi.raft.v1;

import "types.proto";

service RaftClientService {
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc Read (ReadRequest) returns (ReadResponse);
}

service RaftMetricsService {
    rpc Metrics (MetricsRequest) returns (MetricsResponse);
    rpc Leader (LeaderRequest) returns (LeaderResponse);
    rpc Members (MembersRequest) returns (MembersResponse);
}

message WriteRequest {
    Binlog binlog = 1;
}

message WriteResponse {
    Response response = 1;
    LogId log_id = 2;
}

message ReadRequest {
    bytes key = 1;
}

message ReadResponse {
    Response response = 1;
    bytes value = 2;
}

message MetricsRequest {}

message MetricsResponse {
    Response response = 1;
    bool is_leader = 2;
    optional uint64 replication_lag = 3;
    uint64 current_leader = 4;
}

message LeaderRequest {}

message LeaderResponse {
    Response response = 1;
    uint64 leader_id = 2;
    NodeConfig leader_node = 3;
}

message MembersRequest {}

message MembersResponse {
    Response response = 1;
    repeated NodeConfig members = 2;
    repeated uint64 learners = 3;
}
